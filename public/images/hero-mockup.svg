<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow Effects -->
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>
  
  <!-- Glow Effects -->
  <circle cx="200" cy="150" r="150" fill="url(#glow1)" filter="url(#blur)"/>
  <circle cx="600" cy="450" r="120" fill="url(#glow2)" filter="url(#blur)"/>
  
  <!-- Main Dashboard Card (3D Perspective) -->
  <g transform="translate(150, 100)">
    <!-- Shadow -->
    <rect x="10" y="10" width="500" height="380" rx="20" fill="rgba(0,0,0,0.3)" filter="url(#blur)"/>
    
    <!-- Main Card -->
    <rect width="500" height="380" rx="20" fill="url(#cardGrad)" stroke="rgba(6, 182, 212, 0.3)" stroke-width="2"/>
    
    <!-- Glass Effect -->
    <rect width="500" height="380" rx="20" fill="url(#accentGrad)" opacity="0.05"/>
    
    <!-- Header Bar -->
    <rect x="30" y="30" width="440" height="60" rx="12" fill="rgba(6, 182, 212, 0.1)" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1"/>
    <circle cx="60" cy="60" r="15" fill="url(#accentGrad)"/>
    <rect x="90" y="50" width="120" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="90" y="65" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    
    <!-- Stats Cards Row -->
    <g transform="translate(30, 110)">
      <!-- Card 1 -->
      <rect width="130" height="80" rx="10" fill="rgba(6, 182, 212, 0.1)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>
      <rect x="15" y="15" width="40" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
      <text x="15" y="45" font-family="system-ui" font-size="24" font-weight="bold" fill="url(#accentGrad)">50K</text>
      <rect x="15" y="55" width="60" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
      
      <!-- Card 2 -->
      <rect x="155" width="130" height="80" rx="10" fill="rgba(6, 182, 212, 0.1)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>
      <rect x="170" y="15" width="40" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
      <text x="170" y="45" font-family="system-ui" font-size="24" font-weight="bold" fill="url(#accentGrad)">3.5x</text>
      <rect x="170" y="55" width="60" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
      
      <!-- Card 3 -->
      <rect x="310" width="130" height="80" rx="10" fill="rgba(6, 182, 212, 0.1)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>
      <rect x="325" y="15" width="40" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
      <text x="325" y="45" font-family="system-ui" font-size="24" font-weight="bold" fill="url(#accentGrad)">$139</text>
      <rect x="325" y="55" width="60" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    </g>
    
    <!-- Progress Chart -->
    <g transform="translate(30, 210)">
      <rect width="440" height="140" rx="12" fill="rgba(6, 182, 212, 0.05)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>
      
      <!-- Chart Bars -->
      <rect x="40" y="100" width="30" height="20" rx="4" fill="url(#accentGrad)" opacity="0.6"/>
      <rect x="90" y="80" width="30" height="40" rx="4" fill="url(#accentGrad)" opacity="0.7"/>
      <rect x="140" y="50" width="30" height="70" rx="4" fill="url(#accentGrad)" opacity="0.9"/>
      <rect x="190" y="60" width="30" height="60" rx="4" fill="url(#accentGrad)" opacity="0.8"/>
      <rect x="240" y="40" width="30" height="80" rx="4" fill="url(#accentGrad)"/>
      <rect x="290" y="70" width="30" height="50" rx="4" fill="url(#accentGrad)" opacity="0.7"/>
      <rect x="340" y="55" width="30" height="65" rx="4" fill="url(#accentGrad)" opacity="0.85"/>
      <rect x="390" y="45" width="30" height="75" rx="4" fill="url(#accentGrad)" opacity="0.9"/>
      
      <!-- Chart Title -->
      <rect x="20" y="15" width="80" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
      <rect x="20" y="28" width="120" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    </g>
  </g>
  
  <!-- Floating Credit Card (3D) -->
  <g transform="translate(520, 80) rotate(-15)">
    <!-- Card Shadow -->
    <rect x="5" y="5" width="220" height="140" rx="12" fill="rgba(0,0,0,0.4)" filter="url(#blur)"/>
    
    <!-- Card Body -->
    <rect width="220" height="140" rx="12" fill="url(#cardGrad)" stroke="url(#accentGrad)" stroke-width="2"/>
    <rect width="220" height="140" rx="12" fill="url(#accentGrad)" opacity="0.1"/>
    
    <!-- Chip -->
    <rect x="20" y="50" width="35" height="28" rx="4" fill="#ffd700" opacity="0.8"/>
    
    <!-- Card Number -->
    <g opacity="0.5">
      <rect x="20" y="90" width="25" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
      <rect x="50" y="90" width="25" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
      <rect x="80" y="90" width="25" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
      <rect x="110" y="90" width="25" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
    </g>
    
    <!-- Logo -->
    <circle cx="185" cy="30" r="15" stroke="url(#accentGrad)" stroke-width="2" fill="none"/>
    
    <!-- Glow Effect -->
    <rect width="220" height="140" rx="12" stroke="url(#accentGrad)" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Sparkle Effects -->
  <g opacity="0.6">
    <circle cx="100" cy="80" r="3" fill="#06b6d4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="150" r="2" fill="#0891b2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="500" r="2.5" fill="#06b6d4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="520" r="3" fill="#0891b2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
